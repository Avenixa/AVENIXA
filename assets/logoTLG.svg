<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e12"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>

    <linearGradient id="maskG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a78"/>
      <stop offset="50%" style="stop-color:#4a4a58"/>
      <stop offset="100%" style="stop-color:#2a2a35"/>
    </linearGradient>

    <linearGradient id="hornG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7a7a88"/>
      <stop offset="100%" style="stop-color:#2a2a35"/>
    </linearGradient>

    <linearGradient id="lineG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#505060;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#505060"/>
      <stop offset="100%" style="stop-color:#505060;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="42%" r="36%">
      <stop offset="0%" style="stop-color:#18181f;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#080808;stop-opacity:0"/>
    </radialGradient>

    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <filter id="eyeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="500" height="500" fill="url(#bg)"/>
  <rect width="500" height="500" fill="url(#bgGlow)"/>

  <!-- Border -->
  <rect x="18" y="18" width="464" height="464" rx="3" fill="none" stroke="#1a1a22" stroke-width="1"/>

  <!-- Corner marks -->
  <g stroke="#303040" stroke-width="1.5" fill="none">
    <polyline points="18,52 18,18 52,18"/>
    <polyline points="448,18 482,18 482,52"/>
    <polyline points="18,448 18,482 52,482"/>
    <polyline points="448,482 482,482 482,448"/>
  </g>

  <!-- === ONI MASK === -->

  <!-- Left horn -->
  <path d="M 188,118 L 172,65 L 195,55 L 208,110" fill="url(#hornG)" filter="url(#shadow)"/>
  <!-- Left horn inner -->
  <path d="M 191,115 L 178,70 L 193,62 L 204,112" fill="#3a3a45" opacity="0.5"/>

  <!-- Right horn -->
  <path d="M 312,118 L 328,65 L 305,55 L 292,110" fill="url(#hornG)" filter="url(#shadow)"/>
  <!-- Right horn inner -->
  <path d="M 309,115 L 322,70 L 307,62 L 296,112" fill="#3a3a45" opacity="0.5"/>

  <!-- Main face -->
  <path d="M 155,155 Q 148,210 155,260 Q 165,310 200,328 Q 225,340 250,342 Q 275,340 300,328 Q 335,310 345,260 Q 352,210 345,155 Q 310,125 250,122 Q 190,125 155,155 Z"
    fill="url(#maskG)" filter="url(#shadow)"/>

  <!-- Forehead plate -->
  <path d="M 190,122 Q 210,112 250,110 Q 290,112 310,122 Q 295,138 250,140 Q 205,138 190,122 Z"
    fill="#5a5a68"/>

  <!-- Brow ridge left - heavy oni brow -->
  <path d="M 162,178 Q 178,158 220,162 Q 235,165 238,178 Q 222,185 200,182 Q 178,180 162,178 Z"
    fill="#3a3a48"/>

  <!-- Brow ridge right -->
  <path d="M 338,178 Q 322,158 280,162 Q 265,165 262,178 Q 278,185 300,182 Q 322,180 338,178 Z"
    fill="#3a3a48"/>

  <!-- === EYES - glowing narrow oni eyes === -->
  <!-- Left eye -->
  <path d="M 175,192 L 195,180 L 232,183 L 232,198 L 195,202 Z" fill="#0a0a10"/>
  <path d="M 178,193 L 196,183 L 228,186 L 228,197 L 196,200 Z" fill="#1a1a28" filter="url(#eyeGlow)"/>
  <!-- Left iris glow -->
  <ellipse cx="205" cy="192" rx="16" ry="8" fill="#404055" filter="url(#eyeGlow)" opacity="0.8"/>
  <ellipse cx="205" cy="192" rx="8" ry="5" fill="#6060808" opacity="0.7"/>
  <rect x="196" y="189" width="18" height="5" rx="2" fill="#888898" opacity="0.5" filter="url(#eyeGlow)"/>

  <!-- Right eye -->
  <path d="M 325,192 L 305,180 L 268,183 L 268,198 L 305,202 Z" fill="#0a0a10"/>
  <path d="M 322,193 L 304,183 L 272,186 L 272,197 L 304,200 Z" fill="#1a1a28" filter="url(#eyeGlow)"/>
  <!-- Right iris glow -->
  <ellipse cx="295" cy="192" rx="16" ry="8" fill="#404055" filter="url(#eyeGlow)" opacity="0.8"/>
  <ellipse cx="295" cy="192" rx="8" ry="5" fill="#606080" opacity="0.7"/>
  <rect x="286" y="189" width="18" height="5" rx="2" fill="#888898" opacity="0.5" filter="url(#eyeGlow)"/>

  <!-- Nose - flat wide oni nose -->
  <path d="M 232,232 Q 250,225 268,232 L 272,252 Q 260,262 250,260 Q 240,262 228,252 Z"
    fill="#3a3a48"/>
  <!-- Nose holes -->
  <ellipse cx="238" cy="250" rx="7" ry="5" fill="#1a1a25"/>
  <ellipse cx="262" cy="250" rx="7" ry="5" fill="#1a1a25"/>

  <!-- === MOUTH - wide grin with fangs === -->
  <!-- Mouth opening -->
  <path d="M 195,278 Q 210,272 250,270 Q 290,272 305,278 L 302,300 Q 285,312 250,315 Q 215,312 198,300 Z"
    fill="#0a0a12"/>

  <!-- Upper teeth -->
  <rect x="210" y="271" width="16" height="18" rx="3" fill="#c0c0c8"/>
  <rect x="230" y="271" width="14" height="15" rx="2" fill="#b8b8c0"/>
  <rect x="248" y="271" width="14" height="15" rx="2" fill="#b8b8c0"/>
  <rect x="266" y="271" width="16" height="18" rx="3" fill="#c0c0c8"/>

  <!-- Fang left -->
  <path d="M 196,278 L 206,278 L 210,300 L 200,298 Z" fill="#c8c8d0"/>
  <!-- Fang right -->
  <path d="M 304,278 L 294,278 L 290,300 L 300,298 Z" fill="#c8c8d0"/>

  <!-- Lower teeth hints -->
  <rect x="218" y="298" width="12" height="12" rx="2" fill="#a0a0a8" opacity="0.7"/>
  <rect x="236" y="300" width="12" height="10" rx="2" fill="#a0a0a8" opacity="0.7"/>
  <rect x="254" y="300" width="12" height="10" rx="2" fill="#a0a0a8" opacity="0.7"/>
  <rect x="272" y="298" width="12" height="12" rx="2" fill="#a0a0a8" opacity="0.7"/>

  <!-- Face texture lines -->
  <path d="M 172,220 L 185,245" fill="none" stroke="#3a3a48" stroke-width="1.5" opacity="0.5"/>
  <path d="M 328,220 L 315,245" fill="none" stroke="#3a3a48" stroke-width="1.5" opacity="0.5"/>

  <!-- Chin detail -->
  <ellipse cx="250" cy="332" rx="35" ry="10" fill="#3a3a45" opacity="0.6"/>

  <!-- === TLG TEXT === -->
  <rect x="148" y="360" width="204" height="0.8" fill="url(#lineG)"/>

  <text x="250" y="418"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="72" font-weight="200"
    fill="#888898"
    text-anchor="middle"
    filter="url(#softGlow)"
    letter-spacing="18">TLG</text>

  <rect x="148" y="430" width="204" height="0.8" fill="url(#lineG)"/>
</svg>