<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#060810"/>
    </linearGradient>

    <linearGradient id="helmetG" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#7a8898"/>
      <stop offset="40%" style="stop-color:#4a5868"/>
      <stop offset="100%" style="stop-color:#2a3440"/>
    </linearGradient>

    <linearGradient id="glassG" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e40"/>
      <stop offset="50%" style="stop-color:#0e1e2c"/>
      <stop offset="100%" style="stop-color:#080e18"/>
    </linearGradient>

    <linearGradient id="reflectG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8aaabb;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#8aaabb;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="collarG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a6878"/>
      <stop offset="100%" style="stop-color:#2a3440"/>
    </linearGradient>

    <linearGradient id="lineG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5868;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4a5868"/>
      <stop offset="100%" style="stop-color:#4a5868;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="42%" r="36%">
      <stop offset="0%" style="stop-color:#101828;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#060810;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="glassShine" cx="35%" cy="30%" r="55%">
      <stop offset="0%" style="stop-color:#3a5a72;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0e1e2c;stop-opacity:0"/>
    </radialGradient>

    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="rimGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="500" height="500" fill="url(#bg)"/>
  <rect width="500" height="500" fill="url(#bgGlow)"/>

  <!-- Border -->
  <rect x="18" y="18" width="464" height="464" rx="3" fill="none" stroke="#1a2030" stroke-width="1"/>

  <!-- Corner marks -->
  <g stroke="#2a3848" stroke-width="1.5" fill="none">
    <polyline points="18,52 18,18 52,18"/>
    <polyline points="448,18 482,18 482,52"/>
    <polyline points="18,448 18,482 52,482"/>
    <polyline points="448,482 482,482 482,448"/>
  </g>

  <!-- === DEEP SEA / ASTRO HELMET === -->

  <!-- Collar/neck ring base -->
  <ellipse cx="250" cy="318" rx="118" ry="28" fill="url(#collarG)" filter="url(#shadow)"/>
  <!-- Collar bolts -->
  <circle cx="148" cy="318" r="5" fill="#3a4858"/>
  <circle cx="175" cy="332" r="4" fill="#3a4858"/>
  <circle cx="250" cy="338" r="4" fill="#3a4858"/>
  <circle cx="325" cy="332" r="4" fill="#3a4858"/>
  <circle cx="352" cy="318" r="5" fill="#3a4858"/>
  <!-- Collar rim -->
  <ellipse cx="250" cy="318" rx="118" ry="28" fill="none" stroke="#5a6878" stroke-width="2"/>
  <ellipse cx="250" cy="310" rx="110" ry="22" fill="none" stroke="#3a4858" stroke-width="1" opacity="0.5"/>

  <!-- Helmet sphere main -->
  <ellipse cx="250" cy="200" rx="118" ry="125" fill="url(#helmetG)" filter="url(#shadow)"/>

  <!-- Helmet top detail - bolt ring -->
  <ellipse cx="250" cy="83" rx="28" ry="10" fill="#3a4858"/>
  <ellipse cx="250" cy="83" rx="20" ry="7" fill="#2a3848"/>
  <!-- Top bolt -->
  <circle cx="250" cy="80" r="5" fill="#4a5868"/>
  <circle cx="250" cy="80" r="2" fill="#2a3848"/>

  <!-- Helmet horizontal band -->
  <path d="M 133,200 Q 133,190 250,186 Q 367,190 367,200 Q 367,210 250,214 Q 133,210 133,200 Z"
    fill="#3a4858" opacity="0.5"/>

  <!-- Side bolts on helmet -->
  <circle cx="136" cy="180" r="5" fill="#3a4858"/>
  <circle cx="136" cy="220" r="5" fill="#3a4858"/>
  <circle cx="364" cy="180" r="5" fill="#3a4858"/>
  <circle cx="364" cy="220" r="5" fill="#3a4858"/>

  <!-- === VISOR - large round window === -->
  <!-- Visor outer ring -->
  <ellipse cx="250" cy="200" rx="88" ry="92" fill="#1e2a38"/>
  <ellipse cx="250" cy="200" rx="84" ry="88" fill="url(#glassG)"/>

  <!-- Glass reflection -->
  <ellipse cx="250" cy="200" rx="84" ry="88" fill="url(#glassShine)"/>

  <!-- Visor rim highlight -->
  <ellipse cx="250" cy="200" rx="88" ry="92" fill="none" stroke="#5a7888" stroke-width="2" opacity="0.6" filter="url(#rimGlow)"/>

  <!-- Glass inner reflection streaks -->
  <ellipse cx="210" cy="158" rx="28" ry="18" fill="url(#reflectG)" transform="rotate(-20, 210, 158)"/>
  <ellipse cx="228" cy="148" rx="10" ry="6" fill="#8aaabb" opacity="0.15" transform="rotate(-20, 228, 148)"/>

  <!-- Subtle horizon line inside visor -->
  <line x1="168" y1="210" x2="332" y2="210" stroke="#1a2e40" stroke-width="1" opacity="0.4"/>

  <!-- Inside visor - faint silhouette suggestion -->
  <ellipse cx="250" cy="215" rx="38" ry="45" fill="#0a1420" opacity="0.5"/>

  <!-- Eye glow inside helmet - barely visible -->
  <ellipse cx="232" cy="198" rx="12" ry="8" fill="#2a4a5a" opacity="0.4" filter="url(#rimGlow)"/>
  <ellipse cx="268" cy="198" rx="12" ry="8" fill="#2a4a5a" opacity="0.4" filter="url(#rimGlow)"/>

  <!-- Small status light on helmet -->
  <circle cx="330" cy="140" r="5" fill="#3a5848" opacity="0.8"/>
  <circle cx="330" cy="140" r="3" fill="#4a7858" opacity="0.6" filter="url(#rimGlow)"/>

  <!-- === AWEPE TEXT === -->
  <rect x="108" y="362" width="284" height="0.8" fill="url(#lineG)"/>

  <text x="250" y="418"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="58" font-weight="200"
    fill="#7a8898"
    text-anchor="middle"
    filter="url(#softGlow)"
    letter-spacing="10">AWEPE</text>

  <rect x="108" y="430" width="284" height="0.8" fill="url(#lineG)"/>
</svg>