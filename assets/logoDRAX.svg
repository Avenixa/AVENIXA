<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1218"/>
      <stop offset="100%" style="stop-color:#080c10"/>
    </linearGradient>

    <linearGradient id="armorG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8a9aaa"/>
      <stop offset="40%" style="stop-color:#5a6a7a"/>
      <stop offset="100%" style="stop-color:#2a3540"/>
    </linearGradient>

    <linearGradient id="plateG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#aabbc8"/>
      <stop offset="100%" style="stop-color:#4a5a68"/>
    </linearGradient>

    <linearGradient id="visorG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>

    <linearGradient id="lineG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a6070;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4a6070;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a6070;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="42%" r="36%">
      <stop offset="0%" style="stop-color:#1a2535;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#080c10;stop-opacity:0"/>
    </radialGradient>

    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <filter id="visorGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="500" height="500" fill="url(#bg)"/>
  <rect width="500" height="500" fill="url(#bgGlow)"/>

  <!-- Border -->
  <rect x="18" y="18" width="464" height="464" rx="3" fill="none" stroke="#1e2a35" stroke-width="1"/>

  <!-- Corner marks -->
  <g stroke="#2e4055" stroke-width="1.5" fill="none">
    <polyline points="18,52 18,18 52,18"/>
    <polyline points="448,18 482,18 482,52"/>
    <polyline points="18,448 18,482 52,482"/>
    <polyline points="448,482 482,482 482,448"/>
  </g>

  <!-- === WARRIOR/SAMURAI HELMET MASK === -->

  <!-- Helmet top dome -->
  <ellipse cx="250" cy="155" rx="105" ry="95" fill="url(#armorG)" filter="url(#shadow)"/>

  <!-- Helmet top ridge -->
  <rect x="238" y="78" width="24" height="50" rx="8" fill="#6a7a88"/>
  <ellipse cx="250" cy="76" rx="14" ry="10" fill="#7a8a98"/>

  <!-- Side plates -->
  <path d="M 145,155 L 135,220 L 148,275 L 168,290 L 168,220 L 155,170 Z" fill="url(#plateG)" filter="url(#shadow)"/>
  <path d="M 355,155 L 365,220 L 352,275 L 332,290 L 332,220 L 345,170 Z" fill="url(#plateG)" filter="url(#shadow)"/>

  <!-- Side plate bolts -->
  <circle cx="155" cy="200" r="4" fill="#3a4a58"/>
  <circle cx="155" cy="255" r="4" fill="#3a4a58"/>
  <circle cx="345" cy="200" r="4" fill="#3a4a58"/>
  <circle cx="345" cy="255" r="4" fill="#3a4a58"/>

  <!-- Face plate - center -->
  <path d="M 168,150 L 168,290 Q 168,310 250,315 Q 332,310 332,290 L 332,150 Q 290,130 250,128 Q 210,130 168,150 Z"
    fill="url(#armorG)" filter="url(#shadow)"/>

  <!-- Forehead plate seam -->
  <line x1="250" y1="128" x2="250" y2="175" stroke="#3a4a58" stroke-width="1.5" opacity="0.7"/>

  <!-- === VISOR - horizontal slit eyes === -->
  <!-- Visor housing -->
  <rect x="175" y="175" width="150" height="40" rx="6" fill="#1a2530"/>
  <!-- Visor slit glow -->
  <rect x="178" y="179" width="144" height="32" rx="4" fill="url(#visorG)" filter="url(#visorGlow)"/>
  <!-- Visor inner light strip -->
  <rect x="182" y="188" width="136" height="14" rx="3" fill="#2a5a70" opacity="0.8" filter="url(#visorGlow)"/>
  <rect x="182" y="188" width="136" height="6" rx="3" fill="#3a7a90" opacity="0.5"/>
  <!-- Center visor divider -->
  <rect x="247" y="179" width="6" height="32" fill="#0e1218" opacity="0.8"/>

  <!-- Nose bridge / respirator top -->
  <rect x="235" y="215" width="30" height="8" rx="4" fill="#3a4a58"/>

  <!-- === RESPIRATOR / LOWER MASK === -->
  <!-- Main respirator block -->
  <path d="M 195,228 Q 195,310 250,315 Q 305,310 305,228 Z" fill="#3a4a58"/>

  <!-- Respirator grille lines -->
  <g stroke="#2a3540" stroke-width="1.5" opacity="0.7">
    <line x1="210" y1="245" x2="290" y2="245"/>
    <line x1="207" y1="260" x2="293" y2="260"/>
    <line x1="207" y1="275" x2="293" y2="275"/>
    <line x1="210" y1="290" x2="290" y2="290"/>
  </g>

  <!-- Respirator side vents -->
  <ellipse cx="192" cy="265" rx="10" ry="20" fill="#2a3540"/>
  <ellipse cx="308" cy="265" rx="10" ry="20" fill="#2a3540"/>
  <!-- Vent slits left -->
  <g stroke="#1a2530" stroke-width="1" opacity="0.8">
    <line x1="186" y1="252" x2="198" y2="252"/>
    <line x1="184" y1="260" x2="200" y2="260"/>
    <line x1="184" y1="268" x2="200" y2="268"/>
    <line x1="186" y1="276" x2="198" y2="276"/>
  </g>
  <!-- Vent slits right -->
  <g stroke="#1a2530" stroke-width="1" opacity="0.8">
    <line x1="302" y1="252" x2="314" y2="252"/>
    <line x1="300" y1="260" x2="316" y2="260"/>
    <line x1="300" y1="268" x2="316" y2="268"/>
    <line x1="302" y1="276" x2="314" y2="276"/>
  </g>

  <!-- Helmet bottom rim -->
  <path d="M 168,290 Q 168,318 250,322 Q 332,318 332,290" fill="none" stroke="#5a6a78" stroke-width="2.5"/>

  <!-- Subtle scratch/battle mark on helmet -->
  <path d="M 210,145 L 218,165 L 214,180" fill="none" stroke="#3a4a58" stroke-width="1" opacity="0.6"/>

  <!-- === DRAX TEXT === -->
  <rect x="130" y="358" width="240" height="0.8" fill="url(#lineG)"/>

  <text x="250" y="418"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="68" font-weight="200"
    fill="#8a9aaa"
    text-anchor="middle"
    filter="url(#softGlow)"
    letter-spacing="14">DRAX</text>

  <rect x="130" y="430" width="240" height="0.8" fill="url(#lineG)"/>
</svg>