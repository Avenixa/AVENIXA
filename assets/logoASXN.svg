<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100e14"/>
      <stop offset="100%" style="stop-color:#0a080e"/>
    </linearGradient>

    <linearGradient id="hoodG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3545"/>
      <stop offset="100%" style="stop-color:#1a1822"/>
    </linearGradient>

    <linearGradient id="faceG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1820"/>
      <stop offset="100%" style="stop-color:#0a0810"/>
    </linearGradient>

    <linearGradient id="eyeG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a7a9a;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8a9abf"/>
      <stop offset="100%" style="stop-color:#6a7a9a;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="lineG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a4060;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4a4060"/>
      <stop offset="100%" style="stop-color:#4a4060;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#1e1830;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0a080e;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7a8ab0;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3a4060;stop-opacity:0"/>
    </radialGradient>

    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <filter id="eyeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="500" height="500" fill="url(#bg)"/>
  <rect width="500" height="500" fill="url(#bgGlow)"/>

  <!-- Border -->
  <rect x="18" y="18" width="464" height="464" rx="3" fill="none" stroke="#1e1a28" stroke-width="1"/>

  <!-- Corner marks -->
  <g stroke="#2e2840" stroke-width="1.5" fill="none">
    <polyline points="18,52 18,18 52,18"/>
    <polyline points="448,18 482,18 482,52"/>
    <polyline points="18,448 18,482 52,482"/>
    <polyline points="448,482 482,482 482,448"/>
  </g>

  <!-- === HOODED FIGURE === -->

  <!-- Hood outer shape - wide dramatic -->
  <path d="M 115,100 Q 118,60 250,55 Q 382,60 385,100 L 370,200 Q 340,170 250,165 Q 160,170 130,200 Z"
    fill="url(#hoodG)" filter="url(#shadow)"/>

  <!-- Hood inner shadow/depth -->
  <path d="M 148,108 Q 150,75 250,70 Q 350,75 352,108 L 342,185 Q 315,162 250,158 Q 185,162 158,185 Z"
    fill="#15121e"/>

  <!-- Hood fabric folds left -->
  <path d="M 130,200 Q 125,155 148,108" fill="none" stroke="#252030" stroke-width="2" opacity="0.6"/>
  <path d="M 145,205 Q 138,160 155,115" fill="none" stroke="#252030" stroke-width="1.5" opacity="0.4"/>

  <!-- Hood fabric folds right -->
  <path d="M 370,200 Q 375,155 352,108" fill="none" stroke="#252030" stroke-width="2" opacity="0.6"/>
  <path d="M 355,205 Q 362,160 345,115" fill="none" stroke="#252030" stroke-width="1.5" opacity="0.4"/>

  <!-- Face/shadow zone inside hood -->
  <ellipse cx="250" cy="170" rx="82" ry="88" fill="url(#faceG)"/>

  <!-- Robe/cloak body -->
  <path d="M 130,200 Q 100,260 88,340 L 412,340 Q 400,260 370,200 Q 340,215 250,218 Q 160,215 130,200 Z"
    fill="url(#hoodG)" filter="url(#shadow)"/>

  <!-- Robe fold lines -->
  <path d="M 205,218 L 175,340" fill="none" stroke="#252030" stroke-width="1.5" opacity="0.5"/>
  <path d="M 230,220 L 215,340" fill="none" stroke="#252030" stroke-width="1" opacity="0.3"/>
  <path d="M 295,218 L 325,340" fill="none" stroke="#252030" stroke-width="1.5" opacity="0.5"/>
  <path d="M 270,220 L 285,340" fill="none" stroke="#252030" stroke-width="1" opacity="0.3"/>
  <path d="M 250,218 L 250,340" fill="none" stroke="#252030" stroke-width="1" opacity="0.2"/>

  <!-- === EYES — only visible feature, eerie glow === -->
  <!-- Eye glow aura -->
  <ellipse cx="215" cy="168" rx="22" ry="8" fill="url(#eyeGlow)" filter="url(#eyeBlur)" opacity="0.7"/>
  <ellipse cx="285" cy="168" rx="22" ry="8" fill="url(#eyeGlow)" filter="url(#eyeBlur)" opacity="0.7"/>

  <!-- Eye slits -->
  <rect x="197" y="164" width="36" height="8" rx="4" fill="url(#eyeG)" filter="url(#eyeBlur)"/>
  <rect x="267" y="164" width="36" height="8" rx="4" fill="url(#eyeG)" filter="url(#eyeBlur)"/>

  <!-- Eye core bright -->
  <rect x="208" y="166" width="14" height="4" rx="2" fill="#b0bcd8" opacity="0.9"/>
  <rect x="278" y="166" width="14" height="4" rx="2" fill="#b0bcd8" opacity="0.9"/>

  <!-- === ASXN TEXT === -->
  <rect x="118" y="358" width="264" height="0.8" fill="url(#lineG)"/>

  <text x="250" y="418"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-size="68" font-weight="200"
    fill="#7a7a9a"
    text-anchor="middle"
    filter="url(#softGlow)"
    letter-spacing="12">ASXN</text>

  <rect x="118" y="430" width="264" height="0.8" fill="url(#lineG)"/>
</svg>